version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: natakos_db
    restart: always
    environment:
      POSTGRES_USER: nafi_admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: natakos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: